# -------------------------------------------------------
# DEPLOYMENT
# -------------------------------------------------------

apiVersion: apps/v1
kind: Deployment

metadata:
  name: boardgame-deployment
  labels:
    app: boardgame

spec:
  replicas: 2

  selector:
    matchLabels:
      app: boardgame

  template:

    metadata:
      labels:
        app: boardgame

    spec:

      containers:
      - name: boardgame

        image: IMAGE_PLACEHOLDER

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5

---
# -------------------------------------------------------
# SERVICE
# -------------------------------------------------------

apiVersion: v1
kind: Service

metadata:
  name: boardgame-service
  labels:
    app: boardgame

spec:
  type: LoadBalancer

  selector:
    app: boardgame

  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080